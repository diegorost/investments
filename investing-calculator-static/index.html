<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compound Interest Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #181c22;
    --border: #1f2530;
    --accent: #00d4aa;
    --accent2: #0088ff;
    --text: #e8edf4;
    --muted: #5a6478;
    --gain: #00d4aa;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    padding: 2rem 1.5rem;
    background-image:
      radial-gradient(ellipse 80% 40% at 50% -10%, rgba(0,212,170,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 60% 30% at 80% 100%, rgba(0,136,255,0.04) 0%, transparent 60%);
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
  }

  header {
    margin-bottom: 2.5rem;
    border-bottom: 1px solid var(--border);
    padding-bottom: 1.5rem;
  }

  .header-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  h1 {
    font-family: var(--mono);
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 700;
    color: var(--text);
    line-height: 1.2;
  }

  h1 span { color: var(--accent); }

  .subtitle {
    margin-top: 0.4rem;
    font-size: 14px;
    color: var(--muted);
  }

  /* INPUTS */
  .inputs-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .field {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
    transition: border-color 0.2s;
  }

  .field:focus-within {
    border-color: var(--accent);
  }

  .field label {
    display: block;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .field input {
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--mono);
    font-size: 1.2rem;
    font-weight: 700;
    width: 100%;
  }

  .field input::-webkit-inner-spin-button,
  .field input::-webkit-outer-spin-button { opacity: 0.3; }

  /* STATS */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem 1.1rem;
  }

  .stat-card.highlight {
    border-color: rgba(0, 212, 170, 0.3);
    background: linear-gradient(135deg, rgba(0,212,170,0.05) 0%, var(--surface) 60%);
  }

  .stat-label {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.4rem;
  }

  .stat-value {
    font-family: var(--mono);
    font-size: 1.35rem;
    font-weight: 700;
    color: var(--text);
  }

  .stat-value.green { color: var(--gain); }

  /* CHART */
  .chart-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    margin-bottom: 1.5rem;
  }

  .section-title {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1rem;
  }

  .chart-container {
    position: relative;
    height: 260px;
  }

  /* TABLE */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .table-header {
    padding: 0.9rem 1.25rem;
    border-bottom: 1px solid var(--border);
  }

  .table-scroll {
    max-height: 320px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }

  thead th {
    background: var(--surface2);
    padding: 0.6rem 1rem;
    text-align: left;
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    position: sticky;
    top: 0;
  }

  thead th:last-child { text-align: right; }
  thead th:nth-child(3) { text-align: right; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }

  tbody tr:hover { background: var(--surface2); }
  tbody tr:last-child { border-bottom: none; }

  td {
    padding: 0.6rem 1rem;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--text);
  }

  td:nth-child(2) { color: var(--muted); font-size: 11px; }
  td:nth-child(3) { text-align: right; }
  td:nth-child(4) { text-align: right; color: var(--gain); }

  .badge {
    display: inline-block;
    background: rgba(0,212,170,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,212,170,0.2);
    border-radius: 4px;
    padding: 1px 6px;
    font-size: 10px;
    font-family: var(--mono);
  }

  footer {
    margin-top: 2rem;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    font-family: var(--mono);
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <p class="header-label">// financial simulator</p>
    <h1>Compound <span>Interest</span></h1>
    <p class="subtitle">Visualize your capital growth operation by operation</p>
  </header>

  <div class="inputs-grid">
    <div class="field">
      <label>Starting Capital ($)</label>
      <input type="number" id="capital" value="1000" min="1">
    </div>
    <div class="field">
      <label>% per operation</label>
      <input type="number" id="pct" value="6" min="0.1" max="100" step="0.1">
    </div>
    <div class="field">
      <label>Operations / week</label>
      <input type="number" id="ops_per_week" value="3" min="1" max="7">
    </div>
    <div class="field">
      <label>Weeks</label>
      <input type="number" id="weeks" value="4" min="1" max="52">
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <p class="stat-label">Starting Capital</p>
      <p class="stat-value" id="s-inicio">$1,000.00</p>
    </div>
    <div class="stat-card highlight">
      <p class="stat-label">Final Capital</p>
      <p class="stat-value green" id="s-final">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Total Profit</p>
      <p class="stat-value green" id="s-ganancia">—</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">Total Return</p>
      <p class="stat-value green" id="s-retorno">—</p>
    </div>
  </div>

  <div class="chart-wrap">
    <p class="section-title">// growth curve</p>
    <div class="chart-container">
      <canvas id="chart" role="img" aria-label="Capital growth curve"></canvas>
    </div>
  </div>

  <div class="table-wrap">
    <div class="table-header">
      <p class="section-title" style="margin:0">// operation detail</p>
    </div>
    <div class="table-scroll">
      <table>
        <thead>
          <tr>
            <th>Op.</th>
            <th>Week</th>
            <th>Capital</th>
            <th>Op. Profit</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

  <footer>compounding calculator · chart.js</footer>
</div>

<script>
let chartInst = null;

function fmt(n) {
  return '$' + Number(n).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
}

function calculate(payload) {
  const { capital, pct, ops_per_week, weeks } = payload;
  const rate = pct / 100;
  const total_ops = ops_per_week * weeks;

  const capitals = [capital];
  for (let i = 0; i < total_ops; i++) {
    capitals.push(capitals[capitals.length - 1] * (1 + rate));
  }

  const rows = [];
  for (let i = 1; i <= total_ops; i++) {
    const week = Math.floor((i - 1) / ops_per_week) + 1;
    const cap_before = capitals[i - 1];
    const cap_after = capitals[i];
    rows.push({
      op: i,
      week,
      capital: Math.round(cap_after * 100) / 100,
      profit_op: Math.round((cap_after - cap_before) * 100) / 100,
    });
  }

  const final = capitals[capitals.length - 1];
  const total_profit = final - capital;
  const return_pct = ((final / capital) - 1) * 100;

  return {
    capitals: capitals.map(c => Math.round(c * 100) / 100),
    rows,
    final: Math.round(final * 100) / 100,
    total_profit: Math.round(total_profit * 100) / 100,
    return_pct: Math.round(return_pct * 100) / 100,
  };
}

function update() {
  const payload = {
    capital: parseFloat(document.getElementById('capital').value) || 1000,
    pct: parseFloat(document.getElementById('pct').value) || 6,
    ops_per_week: parseInt(document.getElementById('ops_per_week').value) || 3,
    weeks: parseInt(document.getElementById('weeks').value) || 4,
  };

  const d = calculate(payload);

  document.getElementById('s-inicio').textContent = fmt(payload.capital);
  document.getElementById('s-final').textContent = fmt(d.final);
  document.getElementById('s-ganancia').textContent = '+' + fmt(d.total_profit);
  document.getElementById('s-retorno').textContent = '+' + d.return_pct.toFixed(1) + '%';

  const labels = d.capitals.map((_, i) => i === 0 ? 'Start' : 'Op ' + i);

  if (chartInst) chartInst.destroy();
  chartInst = new Chart(document.getElementById('chart'), {
    type: 'line',
    data: {
      labels,
      datasets: [{
        data: d.capitals,
        borderColor: '#00d4aa',
        backgroundColor: 'rgba(0,212,170,0.07)',
        borderWidth: 2,
        pointRadius: d.capitals.length <= 25 ? 4 : 1,
        pointBackgroundColor: '#00d4aa',
        fill: true,
        tension: 0.35
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => ' ' + fmt(ctx.raw)
          },
          backgroundColor: '#181c22',
          borderColor: '#1f2530',
          borderWidth: 1,
          titleColor: '#5a6478',
          bodyColor: '#e8edf4',
          titleFont: { family: 'Space Mono', size: 10 },
          bodyFont: { family: 'Space Mono', size: 12 },
        }
      },
      scales: {
        x: {
          ticks: { color: '#5a6478', font: { family: 'Space Mono', size: 10 }, autoSkip: true, maxTicksLimit: 12 },
          grid: { color: 'rgba(31,37,48,0.8)' }
        },
        y: {
          ticks: {
            color: '#5a6478',
            font: { family: 'Space Mono', size: 10 },
            callback: v => '$' + Number(v).toLocaleString('en-US', {maximumFractionDigits: 0})
          },
          grid: { color: 'rgba(31,37,48,0.8)' }
        }
      }
    }
  });

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  d.rows.forEach(f => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><span class="badge">#${f.op}</span></td>
      <td>Wk. ${f.week}</td>
      <td>${fmt(f.capital)}</td>
      <td>+${fmt(f.profit_op)}</td>
    `;
    tbody.appendChild(tr);
  });
}

document.querySelectorAll('input').forEach(el => el.addEventListener('input', update));
update();
</script>
</body>
</html>
